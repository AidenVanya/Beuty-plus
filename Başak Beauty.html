<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Başak Beauty Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAF7F4;
      color: #2C2C2C;
      overflow-x: hidden;
    }
    :root {
      --cream: #FAF8F5;
      --blush: #F0E6DF;
      --rose: #C9607A;
      --gold: #D4AF37;
      --gold-light: #F0D98A;
      --charcoal: #0D0B08;
      --text-light: #6B5E52;
      --white: #FFFFFF;
      --radius: 16px;
      --grad: linear-gradient(135deg, #E91E8C, #FF6B35, #D4AF37);
    }
    ::selection { background: var(--gold-light); }
    .fade-in { animation: fadeIn 0.7s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 99px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── TWEAK DEFAULTS ─────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#D4AF37",
  "accentColor": "#E91E8C",
  "bgColor": "#FAF8F5",
  "heroLayout": "centered",
  "showReviews": true,
  "ctaText": "Randevu Al"
}/*EDITMODE-END*/;

/* ─── ICONS ──────────────────────────────────────────────── */
const Icon = ({ name, size = 20, color = "currentColor" }) => {
  const icons = {
    menu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
    close: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    arrow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>,
    phone: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11 19.79 19.79 0 01.04 2.39 2 2 0 012 .21h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>,
    mappin: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>,
    clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    whatsapp: <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.05 1.993C6.495 1.993 1.993 6.495 1.993 12.05c0 1.862.487 3.612 1.338 5.131L1.5 22.5l5.432-1.794A10.015 10.015 0 0012.05 22.1c5.554 0 10.057-4.502 10.057-10.057 0-5.553-4.503-10.05-10.057-10.05zm0 18.37a8.31 8.31 0 01-4.237-1.158l-.303-.18-3.145 1.038 1.054-3.064-.197-.317a8.313 8.313 0 01-1.272-4.433c0-4.594 3.739-8.333 8.334-8.333 4.594 0 8.333 3.74 8.333 8.334 0 4.594-3.74 8.333-8.333 8.333z"/></svg>,
    instagram: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>,
    facebook: <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>,
    tiktok: <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.37 6.37 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.16 8.16 0 004.77 1.52V6.75a4.85 4.85 0 01-1-.06z"/></svg>,
    star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    sparkle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5"><path d="M12 2 L13.5 8.5 L20 10 L13.5 11.5 L12 18 L10.5 11.5 L4 10 L10.5 8.5 Z"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
    mail: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
  };
  return icons[name] || null;
};

/* ─── LOGO ───────────────────────────────────────────────── */
const Logo = ({ size = 40 }) => (
  <svg width={size} height={size} viewBox="0 0 60 60" fill="none">
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stopColor="#E91E8C"/>
        <stop offset="50%" stopColor="#FF6B35"/>
        <stop offset="100%" stopColor="#D4AF37"/>
      </linearGradient>
    </defs>
    <circle cx="30" cy="30" r="28" stroke="url(#logoGrad)" strokeWidth="2"/>
    <text x="50%" y="54%" dominantBaseline="middle" textAnchor="middle"
      fontFamily="Cormorant Garamond, serif" fontSize="28" fontWeight="600" fill="#D4AF37">B</text>
  </svg>
);

/* ─── HERO BACKGROUND IMAGE ───────────────────────────────── */
const HeroBg = () => (
  <div style={{ position:'absolute', inset:0, zIndex:0, overflow:'hidden' }}>
    {/* Real beauty salon photo from Unsplash */}
    <img
      src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=1800&auto=format&fit=crop&q=80"
      alt=""
      style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 30%',
        transform:'scale(1.04)', transition:'transform 8s ease' }}
      onLoad={e => { e.target.style.transform = 'scale(1)'; }}
    />
    {/* Dark overlay for text legibility */}
    <div style={{ position:'absolute', inset:0,
      background:'linear-gradient(135deg, rgba(13,11,8,0.72) 0%, rgba(13,11,8,0.45) 60%, rgba(13,11,8,0.3) 100%)' }} />
    {/* Gold gradient accent bottom */}
    <div style={{ position:'absolute', bottom:0, left:0, right:0, height:180,
      background:'linear-gradient(to top, rgba(13,11,8,0.6), transparent)' }} />
    {/* Subtle logo gradient glow top-right */}
    <div style={{ position:'absolute', top:'-5%', right:'-3%', width:500, height:500,
      borderRadius:'50%',
      background:'radial-gradient(circle, rgba(233,30,140,0.08) 0%, rgba(255,107,53,0.06) 40%, transparent 70%)' }} />
  </div>
);

/* ─── SERVICE IMAGE PLACEHOLDERS ────────────────────────── */
const ServiceImg = ({ service }) => {
  const images = {
    nail: 'uploads/img_7.png',
    lash: 'uploads/img_2.png',
    brow: 'uploads/img_3.png',
    hair: 'uploads/img_6.png',
    skin: 'uploads/img_1.png',
    massage: 'uploads/img_8.png',
  };
  
  return (
    <div style={{ width:'100%', aspectRatio:'4/3', borderRadius:'var(--radius) var(--radius) 0 0', overflow:'hidden' }}>
      <img src={images[service]} alt={service} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
    </div>
  );
};

/* ─── NAVBAR ─────────────────────────────────────────────── */
const Navbar = ({ activeSection, setActiveSection, tweaks }) => {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const navLinks = [
    { id: 'home', label: 'Ana Sayfa' },
    { id: 'services', label: 'Hizmetler' },
    { id: 'about', label: 'Hakkımızda' },
    { id: 'contact', label: 'İletişim' },
  ];

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) {
      const offset = 80;
      const top = el.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top, behavior: 'smooth' });
    }
    setActiveSection(id);
    setMobileOpen(false);
  };

  return (
    <>
      <nav style={{
        position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
        background: scrolled ? 'rgba(250,247,244,0.95)' : 'transparent',
        backdropFilter: scrolled ? 'blur(12px)' : 'none',
        borderBottom: scrolled ? '1px solid rgba(201,169,110,0.15)' : 'none',
        transition: 'all 0.35s ease',
        padding: scrolled ? '14px 5%' : '22px 5%',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        {/* Logo */}
        <div style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer' }}
          onClick={() => scrollTo('home')}>
          <Logo size={36} />
          <div>
            <div style={{ fontFamily:'Cormorant Garamond, serif', fontSize:18, fontWeight:600,
              color: scrolled ? 'var(--charcoal)' : '#fff', letterSpacing:'0.04em', lineHeight:1, transition:'color 0.35s' }}>Başak Beauty</div>
            <div style={{ fontSize:9, letterSpacing:'0.2em', color: scrolled ? 'var(--text-light)' : 'rgba(255,255,255,0.6)', textTransform:'uppercase', transition:'color 0.35s' }}>Studio</div>
          </div>
        </div>

        {/* Desktop nav */}
        <div style={{ display:'flex', alignItems:'center', gap:36 }}
          className="desktop-nav">
          {navLinks.map(link => (
            <button key={link.id} onClick={() => scrollTo(link.id)}
              style={{
                background:'none', border:'none', cursor:'pointer', padding:'4px 0',
                fontFamily:'DM Sans, sans-serif', fontSize:13, letterSpacing:'0.1em',
                textTransform:'uppercase', fontWeight:500,
                color: activeSection === link.id ? tweaks.primaryColor : (scrolled ? 'var(--text-light)' : 'rgba(255,255,255,0.75)'),
                borderBottom: activeSection === link.id ? `1px solid ${tweaks.primaryColor}` : '1px solid transparent',
                transition: 'all 0.2s',
              }}>
              {link.label}
            </button>
          ))}
          <button onClick={() => scrollTo('contact')}
            style={{
              background: tweaks.primaryColor, color:'#fff', border:'none', cursor:'pointer',
              padding:'10px 24px', borderRadius:99, fontSize:12, fontWeight:500,
              letterSpacing:'0.08em', textTransform:'uppercase',
              boxShadow:`0 4px 20px ${tweaks.primaryColor}40`,
              transition:'all 0.2s',
            }}
            onMouseEnter={e => e.currentTarget.style.opacity='0.85'}
            onMouseLeave={e => e.currentTarget.style.opacity='1'}>
            {tweaks.ctaText}
          </button>
        </div>

        {/* Mobile hamburger */}
        <button onClick={() => setMobileOpen(!mobileOpen)}
          style={{ display:'none', background:'none', border:'none', cursor:'pointer', padding:4 }}
          className="mobile-hamburger">
          <Icon name={mobileOpen ? 'close' : 'menu'} size={24} color="var(--charcoal)" />
        </button>
      </nav>

      {/* Mobile menu */}
      {mobileOpen && (
        <div style={{
          position:'fixed', inset:0, zIndex:99, background:'rgba(250,247,244,0.97)',
          backdropFilter:'blur(16px)', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', gap:32,
        }}>
          {navLinks.map(link => (
            <button key={link.id} onClick={() => scrollTo(link.id)}
              style={{
                background:'none', border:'none', cursor:'pointer',
                fontFamily:'Cormorant Garamond, serif', fontSize:32, fontWeight:400,
                color: activeSection === link.id ? tweaks.primaryColor : 'var(--charcoal)',
                letterSpacing:'0.04em',
              }}>
              {link.label}
            </button>
          ))}
          <button onClick={() => scrollTo('contact')}
            style={{
              background:tweaks.primaryColor, color:'#fff', border:'none', cursor:'pointer',
              padding:'14px 40px', borderRadius:99, fontSize:14, fontWeight:500, letterSpacing:'0.08em', textTransform:'uppercase',
              marginTop:16,
            }}>
            {tweaks.ctaText}
          </button>
        </div>
      )}

      <style>{`
        @media (max-width: 768px) {
          .desktop-nav { display: none !important; }
          .mobile-hamburger { display: block !important; }
        }
      `}</style>
    </>
  );
};

/* ─── HERO SECTION ───────────────────────────────────────── */
const HeroSection = ({ tweaks }) => {
  const isCentered = tweaks.heroLayout === 'centered';
  return (
    <section id="home" data-screen-label="01 Ana Sayfa" style={{ position:'relative', minHeight:'100vh',
      display:'flex', alignItems:'center', overflow:'hidden', padding:'0 5%' }}>
      <HeroBg />
      <div style={{
        position:'relative', zIndex:1,
        width:'100%', maxWidth:1200, margin:'0 auto',
        display:'grid',
        gridTemplateColumns: isCentered ? '1fr' : '1fr 1fr',
        gap: 60, alignItems:'center',
        textAlign: isCentered ? 'center' : 'left',
        paddingTop: 100,
        paddingBottom: 60,
      }}>
        <div>
          {/* Eyebrow */}
          <div style={{ display:'flex', alignItems:'center', gap:8, justifyContent: isCentered ? 'center' : 'flex-start',
            marginBottom:24, animation:'fadeIn 0.6s ease both' }}>
            <div style={{ width:32, height:1, background:'var(--gold)' }} />
            <span style={{ fontSize:11, letterSpacing:'0.25em', textTransform:'uppercase', color:'var(--gold)', fontWeight:500 }}>
              İstanbul Sancaktepe
            </span>
            <div style={{ width:32, height:1, background:'var(--gold)' }} />
          </div>

          {/* Headline */}
          <h1 style={{
            fontFamily:'Cormorant Garamond, serif', fontSize:'clamp(48px, 7vw, 88px)',
            fontWeight:400, lineHeight:1.05, color:'#FFFFFF',
            marginBottom:28, animation:'fadeIn 0.7s 0.1s ease both',
          }}>
            Güzelliğiniz<br />
            <em style={{ color: tweaks.primaryColor }}>Bizim Tutkumuz</em>
          </h1>

          {/* Subtext */}
          <p style={{
            fontSize:16, lineHeight:1.8, color:'rgba(255,255,255,0.75)',
            maxWidth: isCentered ? 520 : 420,
            margin: isCentered ? '0 auto 40px' : '0 0 40px',
            animation:'fadeIn 0.7s 0.2s ease both',
          }}>
            2022'den bu yana profesyonel güzellik ve bakım hizmetleriyle yanınızdayız.
            Tırnak, kirpik, kaş ve cilt bakımında uzmanlaşmış ekibimizle sizi karşılıyoruz.
          </p>

          {/* CTAs */}
          <div style={{ display:'flex', gap:16, flexWrap:'wrap',
            justifyContent: isCentered ? 'center' : 'flex-start',
            animation:'fadeIn 0.7s 0.3s ease both' }}>
            <a href="https://wa.me/905072075163" target="_blank" rel="noopener"
              style={{
                display:'flex', alignItems:'center', gap:10,
                background: tweaks.primaryColor, color:'#fff',
                padding:'14px 32px', borderRadius:99, fontSize:14, fontWeight:500,
                textDecoration:'none', letterSpacing:'0.04em',
                boxShadow:`0 6px 30px ${tweaks.primaryColor}50`,
                transition:'all 0.25s',
              }}
              onMouseEnter={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow=`0 10px 35px ${tweaks.primaryColor}60`; }}
              onMouseLeave={e => { e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow=`0 6px 30px ${tweaks.primaryColor}50`; }}>
              <Icon name="sparkle" size={16} color="#fff" />
              {tweaks.ctaText}
            </a>
            <button onClick={() => {
                const el = document.getElementById('services');
                if(el) { const top = el.getBoundingClientRect().top + window.scrollY - 80; window.scrollTo({top, behavior:'smooth'}); }
              }}
              style={{
                background:'transparent', border:`1.5px solid ${tweaks.accentColor}`,
                color:'var(--charcoal)', padding:'14px 32px', borderRadius:99,
                fontSize:14, fontWeight:500, cursor:'pointer', letterSpacing:'0.04em',
                transition:'all 0.25s',
              }}
              onMouseEnter={e => { e.currentTarget.style.background=tweaks.accentColor; e.currentTarget.style.color='#fff'; }}
              onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--charcoal)'; }}>
              Hizmetlerimiz
            </button>
          </div>

          {/* Stats */}
          <div style={{ display:'flex', gap:40, marginTop:52,
            justifyContent: isCentered ? 'center' : 'flex-start',
            animation:'fadeIn 0.7s 0.4s ease both' }}>
            {[['500+', 'Mutlu Müşteri'], ['3+', 'Yıllık Deneyim'], ['10+', 'Hizmet Çeşidi']].map(([num, label]) => (
              <div key={label}>
                <div style={{ fontFamily:'Cormorant Garamond, serif', fontSize:32, fontWeight:500, color:tweaks.primaryColor, lineHeight:1 }}>{num}</div>
                <div style={{ fontSize:11, letterSpacing:'0.1em', color:'rgba(255,255,255,0.6)', textTransform:'uppercase', marginTop:4 }}>{label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Right: Visual (only in split layout) */}
        {!isCentered && (
          <div style={{ position:'relative', animation:'fadeIn 0.9s 0.2s ease both' }}>
            {/* Main image placeholder */}
            <div style={{
              width:'100%', aspectRatio:'3/4', borderRadius:'120px 40px 120px 40px',
              overflow:'hidden', position:'relative',
            }}>
              <img src="uploads/img_5.png" alt="Salon Görseli" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
            </div>
            {/* Floating badge */}
            <div style={{
              position:'absolute', bottom:32, left:-28,
              background:'#fff', borderRadius:16, padding:'16px 22px',
              boxShadow:'0 12px 40px rgba(44,44,44,0.12)',
              display:'flex', alignItems:'center', gap:12,
            }}>
              <div style={{ background:`${tweaks.primaryColor}18`, borderRadius:99, width:40, height:40,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name="star" size={18} color={tweaks.primaryColor} />
              </div>
              <div>
                <div style={{ fontFamily:'Cormorant Garamond, serif', fontSize:20, fontWeight:600, lineHeight:1 }}>4.9</div>
                <div style={{ fontSize:10, color:'var(--text-light)', letterSpacing:'0.08em' }}>Google Yorumları</div>
              </div>
            </div>
          </div>
        )}
      </div>

    </section>
  );
};

/* ─── SERVICES SECTION ───────────────────────────────────── */
const ServicesSection = ({ tweaks }) => {

/* ─── APP ────────────────────────────────────────────────── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeSection, setActiveSection] = useState('home');

  useEffect(() => {
    const sections = ['home','services','about','contact'];
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) setActiveSection(entry.target.id);
      });
    }, { threshold: 0.4 });
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  return (
    <div>
      <Navbar activeSection={activeSection} setActiveSection={setActiveSection} tweaks={tweaks} />
      <HeroSection tweaks={tweaks} />
      <ServicesSection tweaks={tweaks} />
      <AboutSection tweaks={tweaks} />
      <ReviewsSection tweaks={tweaks} />
      <ContactSection tweaks={tweaks} />
      <Footer tweaks={tweaks} />

      <TweaksPanel>
        <TweakSection label="Renkler" />
        <TweakColor label="Ana Renk (Altın)" value={tweaks.primaryColor} onChange={v => setTweak('primaryColor', v)} />
        <TweakColor label="Vurgu Rengi (Gül)" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSection label="Hero Düzeni" />
        <TweakRadio label="Layout" value={tweaks.heroLayout}
          options={['centered','split']}
          onChange={v => setTweak('heroLayout', v)} />
        <TweakSection label="İçerik" />
        <TweakText label="Buton Metni" value={tweaks.ctaText} onChange={v => setTweak('ctaText', v)} />
        <TweakToggle label="Yorumları Göster" value={tweaks.showReviews} onChange={v => setTweak('showReviews', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
